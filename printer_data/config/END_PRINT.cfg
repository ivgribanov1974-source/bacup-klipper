[gcode_macro END_PRINT]
gcode:
    # Получаем текущие координаты и границы принтера
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    {% set bed_max_y = printer.toolhead.axis_maximum.y|float %}

    # 1. Безопасный подъем головы после печати
    {% if current_z < max_z %}
        {% set lift_z = [current_z + 2, max_z]|min %}
        G1 Z{lift_z} F600
    {% endif %}

    # 2. Презентация стола (выезд вперед)
    G90                                     # Абсолютные координаты
    G1 X5 Y{bed_max_y * 0.95} F6000         # Подаем стол вперед

    # 3. Дополнительный подъем (ваша логика +70мм)
    {% if current_z < (max_z - 10) %}
        {% set final_z = [current_z + 70, max_z - 10]|min %}
        G1 Z{final_z} F600
    {% endif %}

    # 4. Если деталь маленькая, поднять голову до 60% высоты
    {% if current_z < (max_z * 0.6) %}
        G1 Z{max_z * 0.6} F600
    {% endif %}

    # 5. Выключение нагрева и моторов
    M140 S0                                 # Выключить стол
    M104 S0                                 # Выключить сопло
    M107                                    # Выключить вентилятор обдува
    M84                                     # Отключить моторы
