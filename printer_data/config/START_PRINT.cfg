[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    G90 ; абсолютные координаты
    M83 ; относительный экструдер
    M140 S{BED_TEMP} ; греем стол
    G28 ; пока стол греется, делаем Home
    M190 S{BED_TEMP} ; ждем стол
    M104 S{EXTRUDER_TEMP} ; греем сопло
    M109 S{EXTRUDER_TEMP} ; ждем сопло
    
    G1 Z0.28 F3000 ; чуть приподнять
    G92 E0 
    G1 Y3 F2400 ; подготовка позиции
    G1 X180 E40 F500 ; та самая линия очистки
    G92 E0 
    G1 E-0.2 F3000 ; откат
    G1 X181 F4000 ; быстрый мазок в сторону

SET_TEMPERATURE_FAN_TARGET FAN=Fan_Z_motor TARGET=35 MIN_SPEED=0.35