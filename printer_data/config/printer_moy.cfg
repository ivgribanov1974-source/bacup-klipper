

########################################
[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100

########################################

# X (M3)

########################################
[stepper_x]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PF2
position_endstop: 0
position_max: 420
homing_speed: 50

########################################

# Y (M5)

########################################
[stepper_y]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 40
# endstop_pin: !PF0
position_min: -15
position_endstop:-12
position_max: 420
homing_speed: 50
second_homing_speed: 10
homing_retract_dist: 5

[tmc5160 stepper_y]
cs_pin: PG14
# Настройки программного SPI (Software SPI)
spi_software_sclk_pin: PA5
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
run_current: 1.2
sense_resistor: 0.075
interpolate : False
diag1_pin: !PF0 # use the same pin that was previously the endstop_pin! 
driver_SGT: 1  # -64 is most sensitive value, 63 is least sensitive

#hold_current: 0.5
#stealthchop_threshold: 0

########################################

# Z (M1 + M2)

########################################
[stepper_z]
step_pin: PE6
dir_pin: !PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 450

[stepper_z1]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 8

[safe_z_home]
# Nozzle position of Z endstop switch
home_xy_position: 389.5, 436.5
speed: 200
z_hop: 15
z_hop_speed: 8.0

########################################

# EXTRUDER (M4)

########################################
[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 7.5
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB0
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 300

[tmc2209 extruder]
uart_pin: PB5
interpolate : 1
run_current : 0.8
hold_current : 0.4
sense_resistor : 0.110
driver_sgthrs : 10
stealthchop_threshold : 0

########################################

# BED

########################################
[heater_bed]
heater_pin: PF5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB1
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 120

########################################

# PROBE

########################################
[probe]
pin: ^PD12
x_offset: 0
y_offset: 0
z_offset: 0
speed: 5
samples: 2

########################################

# FILAMENT SENSOR

########################################
[filament_switch_sensor filament_sensor]
switch_pin: ^PF1
pause_on_runout: False

########################################

# FANS

########################################
[fan]
pin: PF7

[heater_fan hotend_fan]
pin: PF9
heater: extruder
heater_temp: 50.0

########################################

# BUZZER

########################################
[output_pin buzzer]
pin: !PD15
value: 0
shutdown_value: 0

########################################

# TMC2209

########################################
[tmc2209 stepper_x]
uart_pin: PB9
interpolate : 1
sense_resistor : 0.110
driver_sgthrs : 100
sense_resistor : 0.110
run_current : 1.4
hold_current : 0.7
stealthchop_threshold : 99999




[tmc2209 stepper_z]
uart_pin: PC13
interpolate : 1
run_current : 1.5
hold_current : 1.0
sense_resistor : 0.110
driver_sgthrs : 100
stealthchop_threshold : 99999


[tmc2209 stepper_z1]
uart_pin: PE3
interpolate : 1
run_current : 1.5
hold_current : 1.0
sense_resistor : 0.110
driver_sgthrs : 100
stealthchop_threshold : 99999




